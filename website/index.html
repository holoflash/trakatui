<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>psikat — a free, open-source, cross-platform music tracker.</title>
    <meta
      name="description"
      content="psikat is a free, open-source, cross-platform music tracker built with Rust. Currently under development."
    />
    <meta
      property="og:title"
      content="psikat — a free, open-source, cross-platform music tracker."
    />
    <meta
      property="og:description"
      content="A free, open-source, cross-platform music tracker built with Rust."
    />
    <meta property="og:image" content="screenshot.png" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#12101c" />
    <link rel="icon" type="image/png" href="psikat.png" />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-dark: rgb(18, 16, 28);
        --bg-panel: rgb(26, 23, 38);
        --border: rgb(120, 100, 60);
        --border-active: rgb(210, 185, 120);
        --text: rgb(210, 190, 140);
        --text-dim: rgb(165, 143, 104);
        --subdivision: rgb(32, 28, 48);
      }

      body {
        font-family:
          ui-monospace, "SF Mono", "Cascadia Mono", "Segoe UI Mono",
          "DejaVu Sans Mono", "Liberation Mono", Menlo, Consolas, monospace;
        background: var(--bg-dark);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }
      header {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1rem;
        flex-direction: column;
      }
      .logo {
        width: 128px;
        image-rendering: pixelated;
        margin: 0;
      }

      h1 {
        font-size: 2rem;
        font-weight: 100;
        font-family: fantasy;
      }
      .tagline {
        text-align: center;
        font-size: 14px;
        letter-spacing: 0.01em;
      }
      img {
        max-width: 800px;
        width: 100%;
        display: block;
        margin: -1rem;
      }
      .links {
        display: flex;
        flex-direction: column;
        width: fit-content;
        align-items: center;
        gap: 1rem;
      }
      .links a {
        font-size: 0.8rem;
        color: var(--text);
        text-decoration: none;
        padding: 0.3rem 0.5rem;
        background: var(--bg-panel);
        border: 1px solid var(--border-active);
        text-transform: uppercase;
        cursor: pointer;
      }
      .links a:hover {
        filter: brightness(1.25);
        border-color: var(--border-active);
      }
      .links a:active {
        border-top-color: rgba(0, 0, 0, 0.4);
        border-left-color: rgba(0, 0, 0, 0.4);
        border-bottom-color: var(--border-active);
        border-right-color: var(--border-active);
        filter: brightness(0.9);
      }
      footer {
        font-size: 0.75rem;
        color: var(--text-dim);
      }
      footer a {
        color: var(--text);
        text-decoration: none;
      }
      footer a:hover {
        text-decoration: underline;
      }
      .description {
        text-align: center;
        font-size: 13px;
        max-width: 520px;
        line-height: 1.6;
        color: var(--text-dim);
      }
      .description a {
        color: var(--text);
        text-decoration: none;
      }
      .description a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header>
        <img src="psikat_full.png" alt="PSIKAT" class="logo" width="128" />
        <p class="tagline">
          A free, open-source, cross-platform music tracker.
        </p>
        <p><strong>UNDER DEVELOPMENT</strong></p>
      </header>

      <img
        src="https://raw.githubusercontent.com/holoflash/psikat/refs/heads/main/screenshot.png"
        fetchpriority="high"
        alt="psikat interface"
        width="800"
      />
      <section class="links">
        <a
          href="https://github.com/holoflash/psikat/releases/latest"
          title="GitHub"
          >Download the latest release</a
        >
        <a href="https://github.com/holoflash/psikat/issues" title="GitHub"
          >Report an issue or request a feature</a
        >
        <a href="https://github.com/holoflash/psikat/blob/main/CONTRIBUTING.md"
          >Contribute</a
        >
      </section>
      <footer>
        Made by <a href="https://github.com/holoflash">holoflash</a>
      </footer>
    </main>
  </body>
</html>
