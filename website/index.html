<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSIKAT — A Lightweight Music Tracker</title>
    <meta
      name="description"
      content="PSIKAT is a lightweight cross-platform music tracker built with Rust. Currently under development."
    />
    <meta property="og:title" content="PSIKAT — A Lightweight Music Tracker" />
    <meta
      property="og:description"
      content="A lightweight cross-platform music tracker built with Rust."
    />
    <meta property="og:image" content="screenshot.png" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#12101c" />
    <link rel="icon" type="image/png" href="psikat.png" />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-dark: rgb(18, 16, 28);
        --bg-panel: rgb(26, 23, 38);
        --border: rgb(120, 100, 60);
        --border-active: rgb(210, 185, 120);
        --text: rgb(210, 190, 140);
        --text-dim: rgb(110, 95, 70);
        --subdivision: rgb(32, 28, 48);
      }

      body {
        font-family:
          ui-monospace, "SF Mono", "Cascadia Mono", "Segoe UI Mono",
          "DejaVu Sans Mono", "Liberation Mono", Menlo, Consolas, monospace;
        background: var(--bg-dark);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        max-width: 780px;
        width: 100%;
        padding: 3rem 1.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      .logo {
        width: 64px;
        height: 64px;
        image-rendering: pixelated;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: var(--text);
      }

      .tagline {
        font-size: 0.85rem;
        color: var(--text-dim);
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 1rem;
        border: 1px solid var(--border);
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--text);
      }

      .screenshot {
        width: 100%;
        border: 1px solid var(--border);
        display: block;
      }

      .screenshot img {
        width: 100%;
        display: block;
      }

      .links {
        display: flex;
        gap: 1.5rem;
      }

      .links a {
        font-family: inherit;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: var(--text);
        text-decoration: none;
        padding: 0.5rem 1.25rem;
        border: 1px solid var(--border);
        background: var(--bg-panel);
      }

      .footer {
        font-size: 0.7rem;
        color: var(--text-dim);
      }

      .footer a {
        color: var(--text-dim);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <img src="psikat.png" alt="PSIKAT" class="logo" />

      <h1>PSIKAT</h1>

      <p class="tagline">
        A lightweight cross-platform music tracker built with Rust
      </p>

      <div class="badge">UNDER DEVELOPMENT</div>

      <div class="screenshot">
        <img src="screenshot.png" alt="PSIKAT interface" />
      </div>

      <div class="links">
        <a
          href="https://github.com/holoflash/psikat/releases/latest"
          id="download-btn"
          >Download</a
        >
        <a href="https://github.com/holoflash/psikat" id="github-btn">GitHub</a>
      </div>

      <p class="footer">
        MIT License · <a href="https://github.com/holoflash">holoflash</a>
      </p>
    </main>
  </body>
</html>
